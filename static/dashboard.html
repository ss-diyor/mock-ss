<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — IELTS Mock SS</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --blue:       #1a56e8;
  --blue-hover: #1441c0;
  --blue-light: #eef3ff;
  --blue-mid:   #c9d8ff;
  --text:       #0b1733;
  --muted:      #4a5978;
  --border:     #c9d8ff;
  --bg:         #f5f8ff;
  --surface:    #ffffff;
  --surface2:   #eef3ff;
  --shadow:     rgba(26, 86, 232, 0.08);
  --red:        #e53e3e;
  --red-light:  #fff5f5;
  --green:      #16a34a;
  --green-light:#f0fdf4;
  --amber:      #d97706;
  --amber-light:#fffbeb;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Inter', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* NAV */
nav {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 48px;
  border-bottom: 1px solid var(--border);
  background: color-mix(in srgb, var(--bg) 85%, transparent);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
.nav-logo-icon {
  width: 46px; height: 46px; border-radius: 10px;
  background: var(--blue); display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 18px; font-weight: 700; color: #fff;
}
.nav-logo-text { display: flex; flex-direction: column; line-height: 1.2; }
.nav-logo-text span:first-child { font-size: 14px; font-weight: 700; font-family: var(--mono); color: var(--text); }
.nav-logo-text span:last-child  { font-size: 12px; font-weight: 500; font-family: var(--mono); color: var(--muted); }
.nav-right { display: flex; align-items: center; gap: 10px; }
.nav-right a { text-decoration: none; }

.btn-outline {
  background: var(--surface); color: var(--text);
  font-family: var(--mono); font-size: 12px; font-weight: 500;
  padding: 8px 16px; border-radius: 6px;
  border: 1px solid var(--border); cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
  display: inline-block;
}
.btn-outline:hover { border-color: var(--blue); color: var(--blue); }
.btn-primary {
  background: var(--blue); color: #fff;
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  padding: 8px 16px; border-radius: 6px; border: none;
  cursor: pointer; transition: background 0.2s;
  display: inline-block; text-decoration: none;
}
.btn-primary:hover { background: var(--blue-hover); }

/* SHELL */
.dash-wrap { max-width: 900px; margin: 40px auto 80px; padding: 0 24px; }

.profile-header {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  padding: 24px 28px; display: flex; align-items: center; justify-content: space-between;
  gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
}
.profile-name { font-size: 20px; font-weight: 800; letter-spacing: -0.3px; }
.profile-email { font-family: var(--mono); font-size: 13px; color: var(--muted); margin-top: 2px; }

.badge {
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  padding: 4px 10px; border-radius: 4px;
  background: var(--blue-light); color: var(--blue);
  display: inline-block; white-space: nowrap;
}
.badge.success { background: var(--green-light); color: var(--green); }
.badge.warning { background: var(--amber-light); color: var(--amber); }
.badge.muted   { background: var(--surface2); color: var(--muted); }

.alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; font-family: var(--mono); border: 1px solid; margin-bottom: 20px; }
.alert.danger { background: var(--red-light); color: var(--red); border-color: #fecaca; }
.alert.success { background: var(--green-light); color: var(--green); border-color: #bbf7d0; }
.alert.info { background: var(--blue-light); color: var(--blue); border-color: var(--blue-mid); }

.dash-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; margin-bottom: 20px; }
.dash-stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; text-align: center; }
.dash-stat-num { font-size: 28px; font-weight: 900; font-family: var(--mono); color: var(--blue); }
.dash-stat-label { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 4px; letter-spacing: .04em; }

.dash-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
.dash-section-head { padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--surface2); font-size: 13px; font-weight: 700; font-family: var(--mono); display: flex; justify-content: space-between; align-items: center; }
.dash-section-body { padding: 20px; }

.section-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; }
.section-card {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; display: flex; flex-direction: column; gap: 8px;
}
.section-card .section-title { font-weight: 700; font-size: 14px; }
.section-card .section-band { font-family: var(--mono); font-size: 24px; font-weight: 800; color: var(--blue); }
.section-card .section-meta { font-size: 12px; color: var(--muted); }
.section-card a {
  margin-top: 4px; text-align: center; text-decoration: none;
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  color: var(--blue); border: 1px solid var(--blue-mid); border-radius: 6px; padding: 7px;
  transition: background 0.15s;
}
.section-card a:hover { background: var(--blue-light); }

.history-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 13px; gap: 10px; flex-wrap: wrap; }
.history-row:last-child { border-bottom: none; }
.history-section { font-weight: 600; min-width: 80px; }
.history-date { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.history-band { font-family: var(--mono); font-weight: 700; color: var(--blue); }

.empty-state { text-align: center; padding: 24px; color: var(--muted); font-size: 13px; }

@media (max-width: 600px) {
  nav { padding: 14px 16px; }
  .profile-header { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">
    <div class="nav-logo-icon">SD</div>
    <div class="nav-logo-text">
      <span>IELTS Mock</span>
      <span>ielts.sultanov.space</span>
    </div>
  </a>
  <div class="nav-right">
    <a class="btn-outline" href="/tests">Test-bank</a>
    <a class="btn-outline" href="/profile">👤 Profil</a>
  </div>
</nav>

<div class="dash-wrap">
  <div id="auth-required" class="alert info" style="display:none;">
    Dashboardni ko'rish uchun avval <a href="/profile?redirect=dashboard" style="color:var(--blue); font-weight:600;">tizimga kiring</a>.
  </div>

  <div id="dash-content" style="display:none;">
    <div class="profile-header">
      <div>
        <div class="profile-name" id="profileName">—</div>
        <div class="profile-email" id="profileEmail">—</div>
      </div>
      <span class="badge" id="statusBadge">—</span>
    </div>

    <div id="message-box" class="alert info" style="display:none;"></div>

    <div class="dash-stats">
      <div class="dash-stat-card">
        <div class="dash-stat-num" id="overallBand">—</div>
        <div class="dash-stat-label">OVERALL BAND</div>
      </div>
      <div class="dash-stat-card">
        <div class="dash-stat-num" id="totalAttempts">0</div>
        <div class="dash-stat-label">URINISHLAR</div>
      </div>
      <div class="dash-stat-card">
        <div class="dash-stat-num" id="completedSections">0/4</div>
        <div class="dash-stat-label">BO'LIMLAR</div>
      </div>
    </div>

    <div class="dash-section">
      <div class="dash-section-head"><span>$ bo'limlar --status</span></div>
      <div class="dash-section-body">
        <div class="section-cards" id="sectionGrid">
          <div class="empty-state">Yuklanmoqda...</div>
        </div>
      </div>
    </div>

    <div class="dash-section">
      <div class="dash-section-head">
        <span>$ natijalar --tarix</span>
        <a href="/profile" class="btn-outline" style="padding:6px 12px;">PDF natija</a>
      </div>
      <div class="dash-section-body" id="historyList">
        <div class="empty-state">Hali natija yo'q.</div>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/dashboard.js"></script>
</body>
</html>
