<!doctype html><html lang="uz"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Test konstruktori — IELTS Mock SS</title><style>
:root{--b:#1a56e8;--t:#0b1733;--m:#667085;--l:#c9d8ff;--bg:#f5f8ff;--s:#fff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:Inter,Arial,sans-serif}button,input,select,textarea{font:inherit}.nav{height:72px;background:#fff;border-bottom:1px solid var(--l);display:flex;align-items:center;padding:0 32px;gap:14px}.nav a{color:var(--b);text-decoration:none;font-weight:700}.nav h1{font-size:18px;margin:0}.wrap{max-width:1280px;margin:28px auto;padding:0 20px}.panel{background:#fff;border:1px solid var(--l);border-radius:14px;margin-bottom:18px;overflow:hidden}.head{padding:14px 18px;background:#eef3ff;border-bottom:1px solid var(--l);font:700 12px monospace}.body{padding:18px}.row{display:flex;gap:10px;align-items:end;flex-wrap:wrap}.field{flex:1;min-width:160px}.field label{display:block;font:700 10px monospace;color:var(--m);margin-bottom:6px;text-transform:uppercase}input,select,textarea{width:100%;border:1px solid var(--l);border-radius:8px;background:#fff;padding:10px;color:var(--t)}textarea{resize:vertical}.btn{border:1px solid var(--l);background:#fff;color:var(--b);padding:10px 14px;border-radius:8px;font-weight:700;cursor:pointer}.primary{background:var(--b);color:#fff;border-color:var(--b)}.danger{color:#b42318}.grid{display:grid;grid-template-columns:300px 1fr;gap:18px}.test-card,.qcard,.media-row{border:1px solid var(--l);border-radius:10px;padding:13px;margin-bottom:9px;background:#fff}.test-card{cursor:pointer}.test-card.active{border-color:var(--b);box-shadow:0 0 0 2px #dce7ff}.tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}.tab{padding:9px 13px;border:1px solid var(--l);border-radius:8px;background:#fff;cursor:pointer;font-weight:700}.tab.active{background:var(--b);color:#fff}.qcard{cursor:grab}.qcard.dragging{opacity:.45}.qtop{display:flex;justify-content:space-between;gap:10px}.muted{color:var(--m);font-size:12px}.badge{display:inline-block;padding:4px 7px;border-radius:5px;background:#eef3ff;color:var(--b);font:700 10px monospace}.empty{text-align:center;color:var(--m);padding:30px}.modal{position:fixed;inset:0;background:#0b1733aa;display:none;place-items:center;z-index:30;padding:20px}.modal.open{display:grid}.modalbox{background:#fff;border-radius:14px;width:min(760px,100%);max-height:92vh;overflow:auto;padding:20px}.previewbox{width:min(1100px,100%);height:90vh;background:#fff;border-radius:14px;padding:12px}.previewbox iframe{width:100%;height:calc(100% - 45px);border:1px solid var(--l)}@media(max-width:850px){.grid{grid-template-columns:1fr}.nav{padding:0 15px}}
</style></head><body><nav class="nav"><a href="/head-teacher">← Panel</a><img src="/static/assets/site-logo-sd.png" style="width:42px;height:42px;object-fit:contain" alt=""><h1>Test konstruktori</h1><span style="margin-left:auto" id="user-label"></span></nav><main class="wrap">
<section class="panel"><div class="head">$ builder --new-test</div><div class="body"><div class="row"><div class="field"><label>Test nomi</label><input id="new-title" placeholder="IELTS Academic Mock"></div><div class="field"><label>Izoh</label><input id="new-desc"></div><div class="field" style="max-width:150px"><label>Daqiqa</label><input id="new-duration" type="number" value="180" min="1" max="360"></div><div class="field" style="max-width:140px"><label>Urinish</label><input id="new-attempts" type="number" value="1" min="1" max="20"></div><button class="btn primary" onclick="createTest()">+ Yaratish</button></div></div></section>
<div class="grid"><aside class="panel"><div class="head">Testlar</div><div class="body" id="test-list"><div class="empty">Yuklanmoqda...</div></div></aside><section id="editor"><div class="panel"><div class="empty">Testni tanlang yoki yangisini yarating</div></div></section></div></main>

<div class="modal" id="question-modal"><div class="modalbox"><div class="row" style="justify-content:space-between"><h2 id="q-modal-title">Savol</h2><button class="btn" onclick="closeQuestionModal()">×</button></div><div class="field"><label>Savol turi</label><select id="q-type" onchange="updateQuestionFields()"><option value="single_choice">Bitta javob</option><option value="multiple_choice">Bir nechta javob</option><option value="short_answer">Qisqa javob</option><option value="true_false">True / False</option><option value="writing_task">Writing task</option><option value="speaking_prompt">Speaking prompt</option></select></div><div class="field"><label>Savol/topshiriq matni</label><textarea id="q-prompt" rows="4"></textarea></div><div class="field" id="q-options-wrap"><label>Variantlar (har qatorda bittadan)</label><textarea id="q-options" rows="5"></textarea></div><div class="field" id="q-answer-wrap"><label>To‘g‘ri javob (multiple uchun vergul bilan)</label><input id="q-answer"></div><div class="row"><div class="field"><label>Ball</label><input id="q-points" type="number" step="0.5" value="1"></div><div class="field"><label>Media</label><select id="q-media"><option value="">Mediasiz</option></select></div></div><div class="field"><label>Izoh/explanation</label><textarea id="q-explanation" rows="2"></textarea></div><button class="btn primary" style="margin-top:12px" onclick="saveQuestion()">Saqlash</button></div></div>
<div class="modal" id="preview-modal"><div class="previewbox"><div class="row" style="justify-content:space-between;height:40px"><b>Preview</b><button class="btn" onclick="closePreview()">×</button></div><iframe id="preview-frame" sandbox="allow-scripts"></iframe></div></div>

<script>
const API='/api/test-builder',token=localStorage.getItem('ielts_token'),adminSecret=sessionStorage.getItem('builder_admin_secret'),isAdmin=!!adminSecret,esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));let tests=[],detail=null,currentSection='listening',editingQuestion=null;
function authHeaders(extra={}){const headers={...extra};if(isAdmin)headers['X-Admin-Secret']=adminSecret;else if(token)headers.Authorization=`Bearer ${token}`;return headers}
async function api(path,opt={}){const r=await fetch(API+path,{...opt,headers:authHeaders(opt.headers||{})}),d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.detail||'Xatolik');return d}
async function init(){if(!token&&!isAdmin){location.href=new URLSearchParams(location.search).has('admin')?'/admin':'/profile';return}try{if(isAdmin){document.getElementById('user-label').textContent='Super-admin';document.querySelector('.nav a').href='/admin'}else{const me=await fetch('/api/auth/me',{headers:authHeaders()}).then(r=>r.json());if(!['head_teacher','director'].includes(me.user?.role))throw new Error('Faqat tashkilot rahbari uchun');document.getElementById('user-label').textContent='@'+me.user.username}await loadTests()}catch(e){document.body.innerHTML=`<div class="empty">${esc(e.message)}</div>`}}async function loadTests(){tests=await api('/tests');renderTests();if(detail){const found=tests.find(t=>t.id===detail.id);if(found)await openTest(found.id)}}
function renderTests(){document.getElementById('test-list').innerHTML=tests.map(t=>`<div class="test-card ${detail?.id===t.id?'active':''}" onclick="openTest(${t.id})"><b>${esc(t.title)}</b><div class="muted">${t.section_count} bo‘lim · ${t.question_count} savol</div><div style="margin-top:7px"><span class="badge">${esc(t.status)}</span> <button class="btn" style="padding:4px 7px" onclick="event.stopPropagation();duplicateTest(${t.id})">Nusxa</button></div></div>`).join('')||'<div class="empty">Test yo‘q</div>'}
async function createTest(){const title=document.getElementById('new-title').value.trim();if(!title)return alert('Test nomini kiriting');try{const d=await api('/tests',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,description:document.getElementById('new-desc').value,duration_minutes:Number(document.getElementById('new-duration').value),attempt_limit:Number(document.getElementById('new-attempts').value)})});await loadTests();await openTest(d.id)}catch(e){alert(e.message)}}
async function duplicateTest(id){try{const d=await api(`/tests/${id}/duplicate`,{method:'POST'});await loadTests();await openTest(d.id)}catch(e){alert(e.message)}}
async function openTest(id){try{detail=await api(`/tests/${id}`);currentSection=detail.sections.some(s=>s.section===currentSection)?currentSection:detail.sections[0]?.section;renderTests();renderEditor()}catch(e){alert(e.message)}}
function section(){return detail.sections.find(s=>s.section===currentSection)}
function renderEditor(){const s=section();document.getElementById('editor').innerHTML=`
<div class="panel"><div class="head">Test sozlamalari · <span class="badge">${esc(detail.status)}</span></div><div class="body"><div class="row"><div class="field"><label>Test nomi</label><input id="edit-test-title" value="${esc(detail.title)}"></div><div class="field"><label>Izoh</label><input id="edit-test-desc" value="${esc(detail.description||'')}"></div><div class="field" style="max-width:120px"><label>Daqiqa</label><input id="edit-test-duration" type="number" value="${detail.duration_minutes}"></div><div class="field" style="max-width:100px"><label>Urinish</label><input id="edit-test-attempts" type="number" value="${detail.attempt_limit}"></div><button class="btn" onclick="saveTestSettings()">Saqlash</button><button class="btn primary" onclick="submitForApproval()">Tasdiqlashga yuborish</button></div></div></div>
<div class="panel"><div class="head">Bo‘lim muharriri</div><div class="body"><div class="tabs">${detail.sections.map(x=>`<button class="tab ${x.section===currentSection?'active':''}" onclick="currentSection='${x.section}';renderEditor()">${esc(x.title)}</button>`).join('')}</div><div class="row"><div class="field"><label>Bo‘lim nomi</label><input id="sec-title" value="${esc(s.title)}"></div><button class="btn" onclick="previewSection()">Preview</button><button class="btn primary" onclick="saveSection()">Bo‘limni saqlash</button></div><div class="field"><label>Ko‘rsatma</label><textarea id="sec-instructions" rows="2">${esc(s.instructions||'')}</textarea></div><div class="field"><label>Passage / asosiy matn</label><textarea id="sec-passage" rows="7">${esc(s.passage||'')}</textarea></div></div></div>
<div class="panel"><div class="head">Media</div><div class="body"><div class="row"><div class="field"><label>Tur</label><select id="media-kind"><option value="image">Rasm</option><option value="audio">Audio</option></select></div><div class="field"><label>Fayl</label><input id="media-file" type="file" accept="image/*,audio/*"></div><button class="btn primary" onclick="uploadMedia()">Yuklash</button></div><div style="margin-top:12px">${detail.media.map(m=>`<span class="badge" style="margin:3px">${esc(m.original_filename)} <button onclick="deleteMedia(${m.id})" style="border:0;background:none;cursor:pointer">×</button></span>`).join('')||'<span class="muted">Media yo‘q</span>'}</div></div></div>
<div class="panel"><div class="head">Savollar · drag-and-drop bilan tartiblang</div><div class="body"><button class="btn primary" onclick="openQuestionModal()">+ Savol qo‘shish</button><div id="questions" style="margin-top:12px">${s.questions.map((q,i)=>`<div class="qcard" draggable="true" data-id="${q.id}"><div class="qtop"><div><span class="badge">${esc(q.question_type)}</span> <b>${i+1}. ${esc(q.prompt)}</b><div class="muted">${q.points} ball${q.media_id?' · media':''}</div></div><div><button class="btn" onclick="editQuestion(${q.id})">Tahrirlash</button> <button class="btn danger" onclick="deleteQuestion(${q.id})">O‘chirish</button></div></div></div>`).join('')||'<div class="empty">Savollar yo‘q</div>'}</div></div></div>`;initDrag()}
async function saveTestSettings(){try{await api(`/tests/${detail.id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:document.getElementById('edit-test-title').value,description:document.getElementById('edit-test-desc').value,test_type:detail.test_type||'IELTS Academic',duration_minutes:Number(document.getElementById('edit-test-duration').value),attempt_limit:Number(document.getElementById('edit-test-attempts').value)})});await openTest(detail.id);await loadTests()}catch(e){alert(e.message)}}
async function submitForApproval(){if(!confirm(isAdmin?'Test barcha foydalanuvchilarga publish qilinsinmi?':'Test super-adminga tasdiqlash uchun yuborilsinmi?'))return;try{const url=isAdmin?`/api/tests/admin/${detail.id}/status/published`:`/api/tests/${detail.id}/publish`,r=await fetch(url,{method:'POST',headers:authHeaders()}),d=await r.json();if(!r.ok)throw new Error(d.detail||'Xatolik');alert(isAdmin?'Test publish qilindi':'Tasdiqlashga yuborildi');await loadTests();detail=null;renderTests();document.getElementById('editor').innerHTML='<div class="panel"><div class="empty">Amal muvaffaqiyatli bajarildi</div></div>'}catch(e){alert(e.message)}}
async function saveSection(){try{await api(`/tests/${detail.id}/sections/${currentSection}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({section:currentSection,title:document.getElementById('sec-title').value,instructions:document.getElementById('sec-instructions').value,passage:document.getElementById('sec-passage').value,settings:{}})});await openTest(detail.id)}catch(e){alert(e.message)}}
function openQuestionModal(q=null){editingQuestion=q;document.getElementById('q-modal-title').textContent=q?'Savolni tahrirlash':'Yangi savol';document.getElementById('q-type').value=q?.question_type||(['writing'].includes(currentSection)?'writing_task':currentSection==='speaking'?'speaking_prompt':'single_choice');document.getElementById('q-prompt').value=q?.prompt||'';document.getElementById('q-options').value=(q?.options||[]).join('\n');document.getElementById('q-answer').value=Array.isArray(q?.correct_answer)?q.correct_answer.join(', '):(q?.correct_answer??'');document.getElementById('q-points').value=q?.points||1;document.getElementById('q-explanation').value=q?.explanation||'';document.getElementById('q-media').innerHTML='<option value="">Mediasiz</option>'+detail.media.map(m=>`<option value="${m.id}">${esc(m.original_filename)}</option>`).join('');document.getElementById('q-media').value=q?.media_id||'';updateQuestionFields();document.getElementById('question-modal').classList.add('open')}
function closeQuestionModal(){document.getElementById('question-modal').classList.remove('open')}function updateQuestionFields(){const type=document.getElementById('q-type').value;document.getElementById('q-options-wrap').style.display=['single_choice','multiple_choice'].includes(type)?'':'none';document.getElementById('q-answer-wrap').style.display=['writing_task','speaking_prompt'].includes(type)?'none':''}
function editQuestion(id){openQuestionModal(section().questions.find(q=>q.id===id))}async function saveQuestion(){const type=document.getElementById('q-type').value,options=document.getElementById('q-options').value.split('\n').map(x=>x.trim()).filter(Boolean),raw=document.getElementById('q-answer').value.trim(),answer=type==='multiple_choice'?raw.split(',').map(x=>x.trim()).filter(Boolean):type==='true_false'?(raw||'True'):raw||null,payload={question_type:type,prompt:document.getElementById('q-prompt').value,options:type==='true_false'?['True','False']:options,correct_answer:answer,points:Number(document.getElementById('q-points').value),explanation:document.getElementById('q-explanation').value,media_id:Number(document.getElementById('q-media').value)||null};try{await api(editingQuestion?`/tests/${detail.id}/questions/${editingQuestion.id}`:`/tests/${detail.id}/sections/${currentSection}/questions`,{method:editingQuestion?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});closeQuestionModal();await openTest(detail.id)}catch(e){alert(e.message)}}
async function deleteQuestion(id){if(!confirm('Savol o‘chirilsinmi?'))return;try{await api(`/tests/${detail.id}/questions/${id}`,{method:'DELETE'});await openTest(detail.id)}catch(e){alert(e.message)}}
function initDrag(){const box=document.getElementById('questions');let dragged=null;box.querySelectorAll('.qcard').forEach(card=>{card.ondragstart=()=>{dragged=card;card.classList.add('dragging')};card.ondragend=async()=>{card.classList.remove('dragging');const ids=[...box.querySelectorAll('.qcard')].map(x=>Number(x.dataset.id));try{await api(`/tests/${detail.id}/sections/${currentSection}/reorder`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question_ids:ids})});await openTest(detail.id)}catch(e){alert(e.message)}};card.ondragover=e=>{e.preventDefault();const rect=card.getBoundingClientRect();box.insertBefore(dragged,e.clientY<rect.top+rect.height/2?card:card.nextSibling)}})}
async function uploadMedia(){const file=document.getElementById('media-file').files[0];if(!file)return alert('Fayl tanlang');const fd=new FormData();fd.append('kind',document.getElementById('media-kind').value);fd.append('file',file);try{await api(`/tests/${detail.id}/media`,{method:'POST',body:fd});await openTest(detail.id)}catch(e){alert(e.message)}}async function deleteMedia(id){if(!confirm('Media o‘chirilsinmi?'))return;try{await api(`/tests/${detail.id}/media/${id}`,{method:'DELETE'});await openTest(detail.id)}catch(e){alert(e.message)}}
async function previewSection(){try{const d=await api(`/tests/${detail.id}/preview/${currentSection}`),bridge=`<script>window.IELTSMock={submitResult:p=>alert('Preview natija: '+JSON.stringify(p))};<\/script>`;document.getElementById('preview-frame').srcdoc=d.html.replace('</head>',bridge+'</head>');document.getElementById('preview-modal').classList.add('open')}catch(e){alert(e.message)}}function closePreview(){document.getElementById('preview-modal').classList.remove('open');document.getElementById('preview-frame').srcdoc=''}init();
</script><script src="/static/site-logo.js"></script></body></html>
