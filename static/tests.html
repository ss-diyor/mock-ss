<!DOCTYPE html><html lang="uz"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Mock testlar — IELTS Mock SS</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>
:root{--blue:#1a56e8;--blue-hover:#1441c0;--blue-light:#eef3ff;--text:#0b1733;--muted:#4a5978;--border:#c9d8ff;--bg:#f5f8ff;--surface:#fff;--surface2:#eef3ff;--green:#16a34a;--mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,sans-serif}*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}nav{display:flex;align-items:center;justify-content:space-between;padding:16px 48px;border-bottom:1px solid var(--border);background:rgba(245,248,255,.94)}.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit}.nav-logo-icon{width:46px;height:46px;border-radius:10px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font:700 17px var(--mono)}.nav-logo-text{display:flex;flex-direction:column}.nav-logo-text span:first-child{font:700 14px var(--mono)}.nav-logo-text span:last-child{font:500 11px var(--mono);color:var(--muted)}.wrap{max-width:1100px;margin:42px auto 80px;padding:0 24px}.eyebrow{font:11px var(--mono);color:var(--blue);margin-bottom:8px}h1{font-size:30px;margin-bottom:8px}.lead{color:var(--muted);margin-bottom:28px}.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}.filter{padding:8px 13px;border:1px solid var(--border);background:var(--surface);border-radius:6px;font:600 11px var(--mono);cursor:pointer}.filter.active{background:var(--blue);color:#fff;border-color:var(--blue)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px}.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}.card-top{height:7px;background:var(--card-color,var(--blue))}.card-body{padding:20px;display:flex;flex-direction:column;gap:12px;flex:1}.org{display:flex;align-items:center;gap:8px;font:600 11px var(--mono);color:var(--muted)}.org img{width:28px;height:28px;object-fit:contain;border-radius:6px}.title{font-size:18px;font-weight:800}.desc{font-size:13px;line-height:1.55;color:var(--muted);min-height:40px}.badges{display:flex;gap:6px;flex-wrap:wrap}.badge{padding:4px 8px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);font:600 10px var(--mono);color:var(--muted)}.btn{margin-top:auto;width:100%;padding:11px;border:0;border-radius:7px;background:var(--blue);color:#fff;font:600 12px var(--mono);cursor:pointer}.empty{text-align:center;padding:60px;color:var(--muted);font:13px var(--mono)}.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;display:inline-block;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}@media(max-width:700px){nav{padding:14px 16px}.wrap{padding:0 16px;margin-top:28px}h1{font-size:25px}}
</style></head><body><nav><a class="nav-logo" href="/"><div class="nav-logo-icon">SS</div><div class="nav-logo-text"><span>IELTS Mock SS</span><span>Testlar katalogi</span></div></a><div id="nav-right"></div></nav><main class="wrap"><div class="eyebrow">$ tests --catalog</div><h1>Mock testlar</h1><p class="lead">Public va tashkilotingiz sizga biriktirgan testlarni tanlang.</p><div class="filters"><button class="filter active" onclick="setFilter('all',this)">Barchasi</button><button class="filter" onclick="setFilter('IELTS Academic',this)">IELTS Academic</button><button class="filter" onclick="setFilter('organization',this)">Tashkilotim</button></div><div id="tests-grid" class="grid"><div class="empty"><span class="spinner"></span> Yuklanmoqda...</div></div></main>
<script>
let token=localStorage.getItem('ielts_token'),tests=[],currentFilter='all';
const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
async function loadTests(){try{const headers=token?{Authorization:`Bearer ${token}`}:{},res=await fetch(`/api/tests?_=${Date.now()}`,{headers,cache:'no-store'}),data=await res.json();if(!res.ok)throw new Error(data.detail||'Testlar yuklanmadi');tests=data;renderTests();if(token)document.getElementById('nav-right').innerHTML='<a href="/profile" style="font:600 11px var(--mono);color:var(--blue);text-decoration:none;">Profil</a>';}catch(e){document.getElementById('tests-grid').innerHTML=`<div class="empty">→ ${esc(e.message)}</div>`}}
function setFilter(value,btn){currentFilter=value;document.querySelectorAll('.filter').forEach(x=>x.classList.remove('active'));btn.classList.add('active');renderTests()}
function renderTests(){const filtered=tests.filter(t=>currentFilter==='all'||t.test_type===currentFilter||(currentFilter==='organization'&&t.visibility!=='public'));document.getElementById('tests-grid').innerHTML=filtered.length?filtered.map(t=>{const sections=t.sections?.length?t.sections.map(s=>s[0].toUpperCase()+s.slice(1)):[];return `<article class="card" style="--card-color:${esc(t.brand_primary_color||'#1a56e8')}"><div class="card-top"></div><div class="card-body"><div class="org">${t.brand_logo_url?`<img src="${esc(t.brand_logo_url)}" alt="">`:''}<span>${esc(t.brand_name||t.organization_name||(t.visibility==='public'?'IELTS Mock SS':'Tashkilot testi'))}</span></div><div class="title">${esc(t.title)}</div><div class="desc">${esc(t.description||'Mock test')}</div><div class="badges"><span class="badge">${esc(t.test_type)}</span>${t.duration_minutes?`<span class="badge">${t.duration_minutes} daqiqa</span>`:''}${t.difficulty?`<span class="badge">${esc(t.difficulty)}</span>`:''}${sections.map(s=>`<span class="badge">${esc(s)}</span>`).join('')}</div><button class="btn" onclick="startTest(${t.id})">Boshlash</button></div></article>`}).join(''):'<div class="empty">Mos testlar topilmadi</div>'}
function startTest(id){if(!token){window.location.href='/profile?redirect=tests';return}const legacyUrl=tests.find(t=>t.id===id)?.legacy_url;if(legacyUrl){window.location.href=legacyUrl;return}window.location.href=`/tests/${id}/run`}
loadTests();
</script><script src="/static/branding.js"></script></body></html>
