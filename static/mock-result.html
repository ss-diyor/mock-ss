<!doctype html><html lang="uz"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Full mock natijasi — IELTS Mock SS</title><style>:root{--b:#1a56e8;--i:#0b1733;--m:#4a5978;--l:#c9d8ff;--bg:#f5f8ff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--i);font-family:Inter,Arial,sans-serif}.wrap{max-width:900px;margin:60px auto;padding:0 22px}.logo{width:46px;height:46px;border-radius:11px;background:var(--b);color:#fff;display:grid;place-items:center;font:800 15px monospace}h1{font-size:30px;margin:18px 0 8px}.lead{color:var(--m)}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:26px 0}.card{background:#fff;border:1px solid var(--l);border-radius:12px;padding:19px}.name{font:700 12px monospace;color:var(--m)}.band{font-size:28px;font-weight:800;color:var(--b);margin-top:8px}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{padding:11px 16px;border-radius:7px;text-decoration:none;font:700 11px monospace}.primary{background:var(--b);color:#fff}.outline{border:1px solid var(--l);color:var(--b);background:#fff}@media(max-width:600px){.grid{grid-template-columns:1fr}}</style></head><body><main class="wrap"><div class="logo">SS</div><h1>Full mock yakunlandi</h1><p class="lead">Bo‘limlar bo‘yicha so‘nggi natijalaringiz.</p><div class="grid" id="results"><div class="card">Natijalar yuklanmoqda...</div></div><div class="actions"><a class="btn primary" href="/profile">To‘liq profil natijalari</a><a class="btn outline" href="/tests">Testlar katalogi</a></div></main><script>
const token=localStorage.getItem('ielts_token'),labels={listening:'Listening',reading:'Reading',writing:'Writing',speaking:'Speaking'};async function load(){if(!token){location.href='/profile';return}try{const r=await fetch('/api/dashboard',{headers:{Authorization:`Bearer ${token}`},cache:'no-store'}),d=await r.json();if(!r.ok)throw new Error(d.detail||'Natija olinmadi');document.getElementById('results').innerHTML=d.sections.map(s=>`<div class="card"><div class="name">${labels[s.section]||s.section}</div><div class="band">${s.latest?.band??(s.is_completed?'Kutilmoqda':'—')}</div><div style="color:#4a5978;font-size:12px;margin-top:6px">Urinishlar: ${s.attempts}</div></div>`).join('')}catch(e){document.getElementById('results').innerHTML=`<div class="card">→ ${e.message}</div>`}}load();
</script></body></html>
