<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Maktab xodimi — IELTS Mock SS</title><meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--blue:#1a56e8;--blue-hover:#1441c0;--blue-light:#eef3ff;--text:#0b1733;--muted:#4a5978;--border:#c9d8ff;--bg:#f5f8ff;--surface:#fff;--surface2:#eef3ff;--red:#e53e3e;--red-light:#fff5f5;--green:#16a34a;--green-light:#f0fdf4;--mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}nav{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:16px 48px;border-bottom:1px solid var(--border);background:rgba(245,248,255,.92);backdrop-filter:blur(12px)}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit}.nav-logo-icon{width:46px;height:46px;border-radius:10px;background:var(--blue);display:flex;align-items:center;justify-content:center;font:700 18px var(--mono);color:#fff}.nav-logo-text{display:flex;flex-direction:column}.nav-logo-text span:first-child{font:700 14px var(--mono)}.nav-logo-text span:last-child{font:500 12px var(--mono);color:var(--muted)}.nav-right{display:flex;gap:10px;align-items:center}
.view{display:none}.view.active{display:block}.auth-wrap{max-width:420px;margin:80px auto;padding:0 24px}.wrap{max-width:1000px;margin:32px auto 80px;padding:0 24px}.form-card,.dash-section,.class-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:18px}.form-card-head,.dash-section-head{padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface2);font:700 13px var(--mono)}.form-card-body,.dash-section-body{padding:20px}.form-card-body{display:flex;flex-direction:column;gap:16px}
label{display:block;font:600 11px var(--mono);color:var(--muted);text-transform:uppercase;margin-bottom:6px}input{width:100%;font:14px var(--sans);color:var(--text);background:var(--bg);border:1.5px solid var(--border);border-radius:7px;padding:10px 12px;outline:none}input:focus{border-color:var(--blue)}.btn-primary,.btn-outline{font:600 12px var(--mono);padding:10px 16px;border-radius:6px;cursor:pointer}.btn-primary{background:var(--blue);color:#fff;border:0}.btn-outline{background:var(--surface);color:var(--text);border:1px solid var(--border)}.btn-sm{padding:6px 10px;font-size:11px}.full{width:100%}.alert{padding:12px 16px;border-radius:8px;font:13px var(--mono);border:1px solid}.danger{background:var(--red-light);color:var(--red);border-color:#fecaca}.badge{font:600 10px var(--mono);padding:4px 8px;border-radius:4px;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.section-tabs{display:flex;gap:4px;margin:20px 0;background:var(--surface2);padding:4px;border-radius:9px;width:max-content;max-width:100%}.section-tab{padding:10px 18px;border:0;background:transparent;border-radius:6px;font:600 13px var(--mono);color:var(--muted);cursor:pointer}.section-tab.active{background:var(--surface);color:var(--blue)}.section-view{display:none}.section-view.active{display:block}.class-head,.student-row{display:flex;justify-content:space-between;align-items:center;gap:12px}.class-head{padding:16px 20px;background:var(--surface2);border-bottom:1px solid var(--border)}.class-body{padding:16px 20px}.student-row{padding:11px 0;border-bottom:1px solid var(--border);font-size:13px}.student-row:last-child{border-bottom:0}.meta{font:11px var(--mono);color:var(--muted);margin-top:4px}.empty-state{text-align:center;padding:35px;color:var(--muted);font:13px var(--mono)}.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}@keyframes spin{to{transform:rotate(360deg)}}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:11px 12px;border-bottom:1px solid var(--border);text-align:left}th{background:var(--surface2);font:600 11px var(--mono);color:var(--muted)}
@media(max-width:700px){nav{padding:14px 16px}.wrap{padding:0 16px}.section-tabs{overflow:auto}.class-head,.student-row{align-items:flex-start;flex-direction:column}}
</style>
</head><body>
<nav><a class="nav-logo" href="/"><div class="nav-logo-icon">M</div><div class="nav-logo-text"><span>Maktab Panel</span><span>Xodim kabineti</span></div></a><div class="nav-right" id="nav-right"></div></nav>
<div class="view active" id="view-auth"><div class="auth-wrap"><p style="font:11px var(--mono);color:var(--blue);margin-bottom:8px;">$ school-staff --login</p><h2 style="font-size:22px;margin-bottom:20px;">Xodim kirishi</h2><div class="form-card"><div class="form-card-head">$ auth --login</div><div class="form-card-body"><div><label>Username yoki email</label><input id="login-id" autocomplete="username"></div><div><label>Parol</label><input id="login-pass" type="password" autocomplete="current-password"></div><div id="login-error" class="alert danger" style="display:none;"></div><button class="btn-primary full" id="login-btn" onclick="doLogin()">→ Kirish</button></div></div></div></div>
<div class="view" id="view-dashboard"><div class="wrap"><p style="font:11px var(--mono);color:var(--blue);margin-bottom:8px;">$ school-staff --dashboard</p><h2 id="welcome-title"></h2><div style="margin-top:8px;"><span class="badge" id="position-badge"></span></div><div class="section-tabs"><button class="section-tab active" id="tab-overview" onclick="switchSection('overview')">Umumiy</button><button class="section-tab" id="tab-classes" onclick="switchSection('classes')" style="display:none;">Sinflar</button><button class="section-tab" id="tab-results" onclick="switchSection('results')" style="display:none;">Natijalar</button></div>
<div class="section-view active" id="section-overview"><div class="dash-section"><div class="dash-section-head">$ huquqlar</div><div class="dash-section-body" id="permissions-list"></div></div></div>
<div class="section-view" id="section-classes"><div id="classes-list"></div></div>
<div class="section-view" id="section-results"><div class="dash-section"><div class="dash-section-head">$ natijalar --latest</div><div class="dash-section-body" style="overflow:auto;"><table><thead><tr><th>O'quvchi</th><th>Sinf</th><th>Bo'lim</th><th>Natija</th><th>Sana</th></tr></thead><tbody id="results-body"></tbody></table></div></div></div>
</div></div>
<script>
const AUTH_API='/api/auth', STAFF_API='/api/school-staff';let token=localStorage.getItem('ielts_token'),staffProfile=null;
const permissionLabels={manage_staff:'Xodimlarni boshqarish',manage_classes:'Sinflarni boshqarish',manage_students:"O'quvchilarni boshqarish",view_results:"Natijalarni ko'rish",manage_exams:'Imtihonlarni boshqarish',view_reports:"Hisobotlarni ko'rish",manage_branding:'Brendingni boshqarish'};
function showView(id){document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active')}
async function api(base,path,options={}){const headers=options.headers||{};if(token)headers.Authorization=`Bearer ${token}`;const res=await fetch(base+path,{...options,headers});const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data.detail||'Xatolik yuz berdi');return data}
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function logout(){localStorage.removeItem('ielts_token');token=null;staffProfile=null;showView('view-auth');document.getElementById('nav-right').innerHTML=''}
async function doLogin(){const login=document.getElementById('login-id').value.trim().replace(/^@/,''),password=document.getElementById('login-pass').value,err=document.getElementById('login-error'),btn=document.getElementById('login-btn');err.style.display='none';if(!login||!password){err.textContent="→ Barcha maydonlarni to'ldiring";err.style.display='block';return}btn.disabled=true;try{const data=await api(AUTH_API,'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login,password})});if(data.user.role!=='school_staff')throw new Error('Bu hisob maktab xodimi sifatida biriktirilmagan');token=data.token;localStorage.setItem('ielts_token',token);await loadProfile()}catch(e){err.textContent='→ '+e.message;err.style.display='block'}finally{btn.disabled=false}}
function applyBranding(b){if(!b)return;document.documentElement.style.setProperty('--blue',b.primary_color);document.documentElement.style.setProperty('--text',b.secondary_color);document.title=`${b.brand_name} — Xodim paneli`;document.querySelector('.nav-logo-text span:first-child').textContent=b.brand_name;const icon=document.querySelector('.nav-logo-icon');if(b.logo_url){icon.innerHTML=`<img src="${b.logo_url}" alt="" style="width:100%;height:100%;object-fit:contain;border-radius:10px;">`;icon.style.background='transparent'}else{icon.textContent=b.brand_name.charAt(0).toUpperCase()}}
async function loadProfile(){try{staffProfile=await api(STAFF_API,'/me');applyBranding(staffProfile.branding);document.getElementById('welcome-title').textContent=`Xush kelibsiz, ${staffProfile.user.full_name}`;document.getElementById('position-badge').textContent=staffProfile.position||'Lavozim belgilanmagan';document.getElementById('permissions-list').innerHTML=staffProfile.permissions.length?staffProfile.permissions.map(p=>`<span class="badge" style="display:inline-block;margin:4px;">${esc(permissionLabels[p]||p)}</span>`).join(''):'<div class="empty-state">Sizga hali huquqlar berilmagan</div>';const canClasses=staffProfile.permissions.some(p=>['manage_classes','manage_students','view_results'].includes(p));document.getElementById('tab-classes').style.display=canClasses?'':'none';document.getElementById('tab-results').style.display=staffProfile.permissions.includes('view_results')?'':'none';document.getElementById('nav-right').innerHTML=`<span class="badge">@${esc(staffProfile.user.username)}</span><button class="btn-outline btn-sm" onclick="logout()">Chiqish</button>`;showView('view-dashboard')}catch(e){logout();const err=document.getElementById('login-error');err.textContent='→ '+e.message;err.style.display='block'}}
function switchSection(which){['overview','classes','results'].forEach(x=>{document.getElementById('tab-'+x).classList.toggle('active',x===which);document.getElementById('section-'+x).classList.toggle('active',x===which)});if(which==='classes')loadClasses();if(which==='results')loadResults()}
async function loadClasses(){const list=document.getElementById('classes-list');list.innerHTML='<div class="empty-state"><span class="spinner"></span> Yuklanmoqda...</div>';try{const rows=await api(STAFF_API,'/classes');list.innerHTML=rows.length?rows.map(c=>`<div class="class-card"><div class="class-head"><div><b>${esc(c.name)}</b><div class="meta">${esc(c.academic_year)} · Rahbar: ${esc(c.homeroom_teacher||'tayinlanmagan')}</div></div><span class="badge">${c.students_count} o'quvchi</span></div><div class="class-body"><button class="btn-outline btn-sm" onclick="loadClassStudents(${c.id})">O'quvchilarni ko'rish</button><div id="students-${c.id}"></div></div></div>`).join(''):'<div class="empty-state">Faol sinflar yo\'q</div>'}catch(e){list.innerHTML=`<div class="alert danger">→ ${esc(e.message)}</div>`}}
async function loadClassStudents(id){const box=document.getElementById(`students-${id}`);box.innerHTML='<div class="empty-state"><span class="spinner"></span></div>';try{const rows=await api(STAFF_API,`/classes/${id}/students`),canManage=staffProfile.permissions.includes('manage_students');box.innerHTML=(canManage?`<div style="display:flex;gap:8px;margin:14px 0;"><input id="student-login-${id}" placeholder="Username yoki email"><button class="btn-primary btn-sm" onclick="addStudent(${id})">Qo'shish</button></div>`:'')+(rows.length?rows.map(s=>`<div class="student-row"><div><b>${esc(s.full_name)}</b><div class="meta">${esc(s.email)} · ${s.attempts} urinish</div></div>${canManage?`<button class="btn-outline btn-sm" onclick="removeStudent(${id},${s.id})">Chiqarish</button>`:''}</div>`).join(''):'<div class="empty-state">O\'quvchilar yo\'q</div>')}catch(e){box.innerHTML=`<div class="alert danger">→ ${esc(e.message)}</div>`}}
async function addStudent(classId){const input=document.getElementById(`student-login-${classId}`);if(!input.value.trim())return;try{await api(STAFF_API,`/classes/${classId}/students`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login:input.value})});await loadClassStudents(classId)}catch(e){alert(e.message)}}
async function removeStudent(classId,studentId){if(!confirm("O'quvchini sinfdan chiqarasizmi?"))return;try{await api(STAFF_API,`/classes/${classId}/students/${studentId}`,{method:'DELETE'});await loadClassStudents(classId)}catch(e){alert(e.message)}}
async function loadResults(){const body=document.getElementById('results-body');body.innerHTML='<tr><td colspan="5" class="empty-state">Yuklanmoqda...</td></tr>';try{const rows=await api(STAFF_API,'/results');body.innerHTML=rows.length?rows.map(r=>`<tr><td>${esc(r.full_name)}</td><td>${esc(r.class_name)}</td><td>${esc(r.section)}</td><td>${r.writing_band??r.speaking_band??(r.score!==null?`${r.score}/${r.total}`:'—')}</td><td>${new Date(r.submitted_at).toLocaleDateString('uz-UZ')}</td></tr>`).join(''):'<tr><td colspan="5" class="empty-state">Natijalar yo\'q</td></tr>'}catch(e){body.innerHTML=`<tr><td colspan="5" class="danger">${esc(e.message)}</td></tr>`}}
(async()=>{if(token)await loadProfile()})();document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('view-auth').classList.contains('active'))doLogin()});
</script><script src="/static/branding.js"></script></body></html>
