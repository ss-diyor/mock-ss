<!doctype html><html lang="uz"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mock test</title><style>
:root{--blue:#1a56e8;--text:#0b1733;--muted:#667085;--line:#d9e2f5;--bg:#f5f8ff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif}header{height:64px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 24px}header a{color:var(--blue);text-decoration:none;font-weight:700}h1{font-size:17px;margin:0;flex:1}#timer{font:700 14px monospace;color:var(--blue)}main{height:calc(100vh - 64px);display:flex;flex-direction:column}#sections{display:flex;gap:8px;padding:10px 20px;background:#fff;border-bottom:1px solid var(--line);overflow:auto}.section{border:1px solid var(--line);background:#fff;border-radius:7px;padding:8px 14px;cursor:pointer}.section.active{background:var(--blue);border-color:var(--blue);color:#fff}iframe{width:100%;flex:1;border:0;background:#fff}#message{margin:auto;padding:24px;color:var(--muted);text-align:center}.danger{color:#b42318!important}
</style></head><body><header><a href="/tests">← Testlar</a><h1 id="title">Test yuklanmoqda...</h1><span id="timer"></span></header><main><div id="sections"></div><div id="message">Test tayyorlanmoqda...</div><iframe id="runner" title="Test bo'limi" sandbox="allow-scripts" hidden></iframe></main><script>
const token=localStorage.getItem('ielts_token'),testId=Number(location.pathname.split('/')[2]),frame=document.getElementById('runner');let detail=null,remaining=0,timerId=null;const labels={listening:'Listening',reading:'Reading',writing:'Writing',speaking:'Speaking'};
function headers(){return token?{Authorization:`Bearer ${token}`}:{}}async function request(path){const res=await fetch(path,{headers:headers()}),type=res.headers.get('content-type')||'',data=type.includes('application/json')?await res.json():{detail:await res.text()};if(!res.ok)throw new Error(data.detail||'Xatolik yuz berdi');return data}
function secureDocument(html){const csp="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob: https:; font-src data:; connect-src 'none'; frame-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'",meta=`<meta http-equiv="Content-Security-Policy" content="${csp}">`;return /<head[\s>]/i.test(html)?html.replace(/<head([^>]*)>/i,`<head$1>${meta}`):meta+html}
async function openSection(section){document.querySelectorAll('.section').forEach(b=>b.classList.toggle('active',b.dataset.section===section));document.getElementById('message').hidden=false;frame.hidden=true;try{const data=await request(`/api/tests/${testId}/sections/${section}`);frame.srcdoc=secureDocument(data.html);frame.hidden=false;document.getElementById('message').hidden=true}catch(e){showError(e.message)}}
function showError(message){const el=document.getElementById('message');el.textContent='→ '+message;el.className='danger';el.hidden=false;frame.hidden=true}function startTimer(minutes){remaining=minutes*60;const draw=()=>{const m=Math.floor(remaining/60),s=remaining%60;document.getElementById('timer').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;if(remaining--<=0)clearInterval(timerId)};draw();timerId=setInterval(draw,1000)}
async function init(){if(!token){location.href='/profile?redirect=tests';return}if(!Number.isInteger(testId)){showError('Test manzili noto‘g‘ri');return}try{detail=await request(`/api/tests/${testId}`);if(detail.legacy_url){location.replace(detail.legacy_url);return}document.title=detail.title+' — Mock test';document.getElementById('title').textContent=detail.title;document.getElementById('sections').innerHTML=detail.sections.map(s=>`<button class="section" data-section="${s}" onclick="openSection('${s}')">${labels[s]||s}</button>`).join('');startTimer(detail.duration_minutes);if(detail.sections.length)openSection(detail.sections[0]);else showError('Test bo‘limlari topilmadi')}catch(e){showError(e.message)}}init();
</script></body></html>
