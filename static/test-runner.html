<!doctype html><html lang="uz"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mock test — IELTS Mock SS</title><style>
:root{--blue:#1a56e8;--text:#0b1733;--muted:#667085;--line:#d9e2f5;--bg:#f5f8ff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif}header{height:64px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 24px}header a{color:var(--blue);text-decoration:none;font-weight:700}h1{font-size:17px;margin:0;flex:1}#timer{font:700 14px monospace;color:var(--blue)}main{height:calc(100vh - 64px);display:flex;flex-direction:column}#sections{display:flex;gap:8px;padding:10px 20px;background:#fff;border-bottom:1px solid var(--line);overflow:auto}.section{border:1px solid var(--line);background:#fff;border-radius:7px;padding:8px 14px;cursor:pointer}.section.active{background:var(--blue);border-color:var(--blue);color:#fff}iframe{width:100%;flex:1;border:0;background:#fff}#message{margin:auto;padding:24px;color:var(--muted);text-align:center}.danger{color:#b42318!important}
</style></head><body><header><a href="/tests">← Testlar</a><h1 id="title">Test yuklanmoqda...</h1><div id="speaking-controls" hidden><button onclick="startSpeakingRecording()">🎙 Yozish</button> <button id="stop-speaking" onclick="stopSpeakingRecording()" disabled>⏹ To‘xtatish</button> <span id="recording-status"></span></div><span id="timer"></span></header><main><div id="sections"></div><div id="message">Test tayyorlanmoqda...</div><iframe id="runner" title="Test bo'limi" sandbox="allow-scripts" hidden></iframe></main><script>
const token=localStorage.getItem('ielts_token'),testId=Number(location.pathname.split('/')[2]),frame=document.getElementById('runner'),params=new URLSearchParams(location.search),testMode=params.get('mode')==='full'?'full':'practice',requestedSection=params.get('section');let detail=null,remaining=0,timerId=null,sessionId=null,currentSection=null,submitting=false,speakingRecorder=null,speakingChunks=[],speakingBlob=null;const labels={listening:'Listening',reading:'Reading',writing:'Writing',speaking:'Speaking'};
function headers(extra={}){return token?{...extra,Authorization:`Bearer ${token}`}:extra}async function request(path,options={}){const res=await fetch(path,{...options,headers:headers(options.headers||{})}),type=res.headers.get('content-type')||'',data=type.includes('application/json')?await res.json():{detail:await res.text()};if(!res.ok)throw new Error(data.detail||'Xatolik yuz berdi');return data}
function secureDocument(html){const csp="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob: https:; font-src data:; connect-src 'none'; frame-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'",meta=`<meta http-equiv="Content-Security-Policy" content="${csp}">`,bridge=`<script>(function(){let sent=false;function send(payload){if(sent)return;payload=payload||{};parent.postMessage({type:'IELTS_MOCK_RESULT',payload:payload},'*');sent=true}window.IELTSMock={submitResult:send};document.addEventListener('click',function(e){const b=e.target.closest('button,input[type=submit]');if(!b||!/submit|deliver|finish|yakun|natija|check/i.test(b.textContent||b.value||''))return;setTimeout(function(){const r=window.testResults||{},el=document.querySelector('#results-score,#result-score,#score-summary,[data-result-score]'),raw=r.score??el?.textContent,score=Number.parseInt(String(raw||'').match(/\d+/)?.[0],10),total=Number(r.total||40);if(Number.isFinite(score))send({score:score,total:total,answers:r.answers||{},duration_seconds:null})},1200)},true)})();<\/script>`;const additions=meta+bridge;return /<head[\s>]/i.test(html)?html.replace(/<head([^>]*)>/i,`<head$1>${additions}`):additions+html}
async function openSection(section){currentSection=section;document.getElementById('speaking-controls').hidden=section!=='speaking';document.querySelectorAll('.section').forEach(b=>b.classList.toggle('active',b.dataset.section===section));document.getElementById('message').hidden=false;frame.hidden=true;try{const data=await request(`/api/tests/${testId}/sections/${section}`);frame.srcdoc=secureDocument(data.html);frame.hidden=false;document.getElementById('message').hidden=true}catch(e){showError(e.message)}}
function showError(message){const el=document.getElementById('message');el.textContent='→ '+message;el.className='danger';el.hidden=false;frame.hidden=true}function startTimer(minutes){remaining=minutes*60;const draw=()=>{const m=Math.floor(remaining/60),s=remaining%60;document.getElementById('timer').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;if(remaining--<=0)clearInterval(timerId)};draw();timerId=setInterval(draw,1000)}
async function createSession(){const me=await request('/api/auth/me'),user=me.user,start=await request('/api/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({full_name:user.full_name,email:user.email,test_id:testId})});sessionId=start.session_id;sessionStorage.setItem('ielts_session_id',sessionId);sessionStorage.setItem('ielts_name',user.full_name);sessionStorage.setItem('ielts_email',user.email)}
async function saveResult(payload){if(submitting)return;submitting=true;try{const completedSection=currentSection,score=payload.score==null?null:Number(payload.score),total=payload.total==null?null:Number(payload.total);if(completedSection==='speaking'){if(!speakingBlob)throw new Error('Avval Speaking audio yozuvini yozib, to‘xtating');const fd=new FormData();fd.append('session_id',sessionId);fd.append('test_id',testId);fd.append('audio',speakingBlob,'speaking.webm');await request('/api/submit-speaking',{method:'POST',body:fd})}else{if(score!==null&&(!Number.isFinite(score)||!Number.isFinite(total)||score<0||score>total))throw new Error('HTML test noto‘g‘ri natija yubordi');await request('/api/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,full_name:sessionStorage.getItem('ielts_name')||'',email:sessionStorage.getItem('ielts_email')||'',section:completedSection,score,total,answers:payload.answers||{},writing_task1:payload.writing_task1||null,writing_task2:payload.writing_task2||null,duration_seconds:payload.duration_seconds||null,test_id:testId,test_slug:detail.slug,test_mode:testMode})})}const btn=document.querySelector(`.section[data-section="${completedSection}"]`);if(btn)btn.textContent='✓ '+(labels[completedSection]||completedSection);showSaved();if(testMode==='full'){const i=detail.sections.indexOf(completedSection),next=detail.sections[i+1];setTimeout(()=>{if(next){const nextBtn=document.querySelector(`.section[data-section="${next}"]`);if(nextBtn)nextBtn.disabled=false;openSection(next)}else location.href='/mock-result'},1800)}}catch(e){alert('Natija saqlanmadi: '+e.message)}finally{submitting=false}}
async function startSpeakingRecording(){try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});speakingChunks=[];speakingBlob=null;speakingRecorder=new MediaRecorder(stream,{mimeType:MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':undefined});speakingRecorder.ondataavailable=e=>{if(e.data.size)speakingChunks.push(e.data)};speakingRecorder.onstop=()=>{speakingBlob=new Blob(speakingChunks,{type:speakingRecorder.mimeType||'audio/webm'});stream.getTracks().forEach(t=>t.stop());document.getElementById('recording-status').textContent='✓ Audio tayyor'};speakingRecorder.start(500);document.getElementById('stop-speaking').disabled=false;document.getElementById('recording-status').textContent='● Yozilmoqda'}catch(e){alert('Mikrofonga ruxsat berilmadi: '+e.message)}}function stopSpeakingRecording(){if(speakingRecorder?.state==='recording'){speakingRecorder.stop();document.getElementById('stop-speaking').disabled=true}}
function showSaved(){const note=document.createElement('div');note.textContent='✓ Natija saqlandi va xabarnomalar yuborildi';note.style.cssText='position:fixed;right:18px;bottom:18px;z-index:99;background:#16a34a;color:#fff;padding:12px 16px;border-radius:8px;font:700 12px monospace';document.body.appendChild(note);setTimeout(()=>note.remove(),5000)}
window.addEventListener('message',event=>{if(event.source!==frame.contentWindow||event.data?.type!=='IELTS_MOCK_RESULT')return;saveResult(event.data.payload||{})});
async function init(){if(!token){location.href='/profile?redirect=tests';return}if(!Number.isInteger(testId)){showError('Test manzili noto‘g‘ri');return}try{detail=await request(`/api/tests/${testId}`);if(detail.legacy_url){location.replace(detail.legacy_url);return}await createSession();document.title=detail.title+' — Mock test';document.getElementById('title').textContent=detail.title;document.getElementById('sections').innerHTML=detail.sections.map((s,i)=>`<button class="section" data-section="${s}" ${testMode==='full'&&i>0?'disabled':''} onclick="openSection('${s}')">${labels[s]||s}</button>`).join('');startTimer(detail.duration_minutes);const first=testMode==='practice'&&detail.sections.includes(requestedSection)?requestedSection:detail.sections[0];if(first)openSection(first);else showError('Test bo‘limlari topilmadi')}catch(e){showError(e.message)}}init();
</script><script src="/static/site-logo.js"></script></body></html>
