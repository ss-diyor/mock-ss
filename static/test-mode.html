<!doctype html><html lang="uz"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Test rejimi — IELTS Mock SS</title><style>:root{--b:#1a56e8;--i:#0b1733;--m:#4a5978;--l:#c9d8ff;--bg:#f5f8ff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--i);font-family:Inter,Arial,sans-serif}.wrap{max-width:950px;margin:55px auto;padding:0 22px}.back{color:var(--b);text-decoration:none;font:700 11px monospace}h1{font-size:29px;margin:18px 0 7px}.lead{color:var(--m)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:26px}.card{background:#fff;border:1px solid var(--l);border-radius:15px;padding:24px;box-shadow:0 8px 26px rgba(11,23,51,.06)}.tag{color:var(--b);font:700 10px monospace}.card h2{margin:10px 0 7px}.card p{color:var(--m);line-height:1.5}.btn,.part{border-radius:7px;font:700 11px monospace;cursor:pointer}.btn{width:100%;border:0;background:var(--b);color:#fff;padding:12px;margin-top:18px}.parts{display:flex;flex-direction:column;gap:8px;margin-top:16px}.part{border:1px solid var(--l);background:#fff;color:var(--b);padding:10px;text-align:left}@media(max-width:650px){.grid{grid-template-columns:1fr}}</style></head><body><main class="wrap"><a class="back" href="/tests">← Testlar</a><h1 id="title">Test yuklanmoqda...</h1><p class="lead">Imtihon rejimini tanlang.</p><div class="grid"><section class="card"><div class="tag">$ mode --full</div><h2>Full mock</h2><p>Sectionlar belgilangan tartibda ketma-ket ishlanadi.</p><button class="btn" onclick="startFull()">Full mockni boshlash</button></section><section class="card"><div class="tag">$ mode --practice</div><h2>Practice mode</h2><p>Faqat kerakli sectionni tanlang.</p><div class="parts" id="parts"></div></section></div></main><script>const token=localStorage.getItem('ielts_token'),testId=Number(location.pathname.split('/')[2]);let detail=null;const labels={listening:'Listening',reading:'Reading',writing:'Writing',speaking:'Speaking'};async function init(){if(!token){location.href='/profile?redirect=tests';return}const r=await fetch(`/api/tests/${testId}`,{headers:{Authorization:`Bearer ${token}`}}),d=await r.json();if(!r.ok){alert(d.detail||'Test topilmadi');location.href='/tests';return}detail=d;document.getElementById('title').textContent=d.title;document.getElementById('parts').innerHTML=d.sections.map(s=>`<button class="part" onclick="practice('${s}')">${labels[s]||s}</button>`).join('')}function startFull(){location.href=`/tests/${testId}/run?mode=full`}function practice(section){location.href=`/tests/${testId}/run?mode=practice&section=${section}`}init();</script></body></html>
